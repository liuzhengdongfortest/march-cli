<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>March Web Prototype</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell" data-left-open="false" data-right-open="false">
      <header class="top-bar">
        <button class="icon-button mobile-only" data-toggle-left aria-label="Open context panel">☰</button>
        <div>
          <p class="eyebrow">March</p>
          <h1>march-cli-standalone</h1>
        </div>
        <button class="icon-button mobile-only" data-toggle-right aria-label="Open activity panel">◧</button>
      </header>

      <div class="overlay" data-close-panels></div>

      <aside class="panel left-panel" aria-label="File explorer">
        <section class="explorer-header">
          <div>
            <p class="eyebrow">Explorer</p>
            <h2>march-cli-standalone</h2>
          </div>
          <button class="icon-button compact" aria-label="New file">＋</button>
        </section>

        <nav class="file-tree" aria-label="Workspace files">
          <button class="file-row root active" type="button"><span class="file-main"><span class="chevron open">›</span><span class="file-icon">▣</span><span>march-cli-standalone</span></span><span class="file-meta">git</span></button>
          <button class="file-row folder" type="button" style="--level: 1"><span class="file-main"><span class="chevron open">›</span><span class="file-icon">src</span><span>src</span></span></button>
          <button class="file-row folder" type="button" style="--level: 2"><span class="file-main"><span class="chevron open">›</span><span class="file-icon">web</span><span>web-ui</span></span></button>
          <button class="file-row file selected" type="button" style="--level: 3"><span class="file-main"><span class="chevron blank"></span><span class="file-icon">html</span><span>index.html</span></span><span class="file-meta">open</span></button>
          <button class="file-row file" type="button" style="--level: 3"><span class="file-main"><span class="chevron blank"></span><span class="file-icon">css</span><span>styles.css</span></span></button>
          <button class="file-row file" type="button" style="--level: 3"><span class="file-main"><span class="chevron blank"></span><span class="file-icon">js</span><span>app.js</span></span></button>
          <button class="file-row folder" type="button" style="--level: 1"><span class="file-main"><span class="chevron">›</span><span class="file-icon">test</span><span>test</span></span><span class="file-meta">12</span></button>
          <button class="file-row file modified" type="button" style="--level: 1"><span class="file-main"><span class="chevron blank"></span><span class="file-icon">md</span><span>AGENTS.md</span></span><span class="git-dot">M</span></button>
          <button class="file-row file" type="button" style="--level: 1"><span class="file-main"><span class="chevron blank"></span><span class="file-icon">json</span><span>package.json</span></span></button>
        </nav>
      </aside>

      <main class="timeline" aria-label="Agent timeline">
        <div class="timeline-header">
          <div>
            <p class="eyebrow">Session</p>
            <h2>Web shell</h2>
          </div>
          <button class="ghost-button">Share</button>
        </div>

        <article class="turn user-turn">
          <div class="avatar">U</div>
          <div class="bubble">参考 MindFS，做 Web UI。</div>
        </article>

        <article class="turn assistant-turn">
          <div class="avatar march">M</div>
          <div class="bubble stack">
            <div class="tool-card">
              <div class="tool-card-header"><span>read</span><strong>workspace</strong><em>done</em></div>
            </div>
            <div class="diff-card">
              <div class="diff-line add">+ src/web-ui</div>
              <div class="diff-line keep">  runtime unchanged</div>
            </div>
          </div>
        </article>
      </main>

      <aside class="panel right-panel" aria-label="Activity panel">
        <section class="panel-section">
          <div class="section-heading"><span>Sessions</span><button class="mini-button">New</button></div>
          <div class="session-card active"><strong>Web shell</strong><span>now</span></div>
          <div class="session-card"><strong>Memory</strong><span>1d</span></div>
        </section>
        <section class="panel-section">
          <div class="section-heading"><span>Todos</span><span class="pill muted">3</span></div>
          <label class="todo"><input type="checkbox" checked /> Layout</label>
          <label class="todo"><input type="checkbox" checked /> Drawers</label>
          <label class="todo"><input type="checkbox" /> Runtime</label>
        </section>
      </aside>

      <form class="composer" aria-label="Message composer">
        <button type="button" class="ghost-button">/</button>
        <textarea rows="1" placeholder="Message March…"></textarea>
        <button type="button" class="ghost-button">Attach</button>
        <button type="submit" class="send-button">Send</button>
      </form>
    </div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
