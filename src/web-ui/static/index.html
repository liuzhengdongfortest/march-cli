<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>March Web Prototype</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell" data-left-open="false" data-right-open="false">
      <div class="overlay" data-close-panels></div>

      <aside class="panel left-panel" aria-label="Projects">
        <div class="projects-header">
          <h3>Projects</h3>
          <button class="menu-button" type="button" aria-label="Open project menu">
            <span></span><span></span><span></span>
          </button>
        </div>

        <div class="projects-body">
          <ul class="project-tree" aria-label="Project files">
            <li>
              <button class="tree-row selected root-node" type="button" style="--depth: 0">
                <span class="tree-icon chevron open" aria-hidden="true"></span>
                <span class="root-badge">march-cli-standalone</span>
                <span class="bound-dot" aria-label="Bound session"></span>
              </button>
              <ul>
                <li>
                  <button class="tree-row" type="button" style="--depth: 1">
                    <span class="tree-icon chevron open" aria-hidden="true"></span>
                    <span>src</span>
                  </button>
                  <ul>
                    <li>
                      <button class="tree-row" type="button" style="--depth: 2">
                        <span class="tree-icon chevron open" aria-hidden="true"></span>
                        <span>web-ui</span>
                      </button>
                      <ul>
                        <li><button class="tree-row" type="button" style="--depth: 3"><span class="tree-icon file code" aria-hidden="true"></span><span>server.mjs</span></button></li>
                        <li><button class="tree-row active-file" type="button" style="--depth: 3"><span class="tree-icon file markup" aria-hidden="true"></span><span>index.html</span><span class="session-link">◆</span></button></li>
                        <li><button class="tree-row" type="button" style="--depth: 3"><span class="tree-icon file" aria-hidden="true"></span><span>styles.css</span></button></li>
                        <li><button class="tree-row" type="button" style="--depth: 3"><span class="tree-icon file code" aria-hidden="true"></span><span>app.js</span></button></li>
                      </ul>
                    </li>
                  </ul>
                </li>
                <li><button class="tree-row" type="button" style="--depth: 1"><span class="tree-icon chevron" aria-hidden="true"></span><span>test</span></button></li>
                <li><button class="tree-row" type="button" style="--depth: 1"><span class="tree-icon file markup" aria-hidden="true"></span><span>AGENTS.md</span></button></li>
                <li><button class="tree-row" type="button" style="--depth: 1"><span class="tree-icon file" aria-hidden="true"></span><span>package.json</span></button></li>
              </ul>
            </li>
          </ul>
        </div>
      </aside>

      <main class="timeline" aria-label="Agent timeline">
        <div class="main-header">
          <span>Session</span>
          <button class="header-button" type="button">Share</button>
        </div>
        <div class="timeline-scroll">
          <div class="session-title">
            <h1>Web shell</h1>
            <span>gpt-4.1 · fast</span>
          </div>

          <article class="message-row user-turn">
            <div class="agent-dot">U</div>
            <div class="message-body">参考 MindFS，做 Web UI。</div>
          </article>

          <article class="message-row assistant-turn">
            <div class="agent-dot march">M</div>
            <div class="message-body">
              <p>按 MindFS 结构复刻。</p>
              <div class="tool-row">
                <span class="tool-kind">read</span>
                <strong>workspace</strong>
                <em>done</em>
              </div>
              <div class="diff-inline">
                <div class="diff-line add">+ src/web-ui</div>
                <div class="diff-line keep">  runtime unchanged</div>
              </div>
            </div>
          </article>
        </div>
      </main>

      <aside class="panel right-panel" aria-label="Sessions">
        <div class="right-header">会话</div>
        <div class="right-body">
          <button class="session-row active" type="button"><span>Web shell</span><time>now</time></button>
          <button class="session-row" type="button"><span>Memory</span><time>1d</time></button>
          <div class="right-divider">Activity</div>
          <button class="activity-row" type="button"><span>read</span><time>now</time></button>
          <button class="activity-row" type="button"><span>edit</span><time>2m</time></button>
          <button class="activity-row" type="button"><span>test</span><time>5m</time></button>
        </div>
      </aside>

      <form class="composer" aria-label="Message composer">
        <button type="button" class="mobile-toggle" data-toggle-left aria-label="Open files">▦</button>
        <div class="composer-box">
          <textarea rows="1" placeholder="Message March…"></textarea>
          <div class="composer-actions">
            <button type="button" class="session-ring" aria-label="Session"></button>
            <button type="button" class="chip-button">Chat</button>
            <button type="button" class="icon-action" aria-label="Attach">+</button>
            <button type="submit" class="send-icon" aria-label="Send">↑</button>
          </div>
        </div>
        <button type="button" class="mobile-toggle" data-toggle-right aria-label="Open sessions">☰</button>
      </form>
    </div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
